services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: matchmaker
      POSTGRES_PASSWORD: matchmaker
      POSTGRES_DB: matchmaker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmaker"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
